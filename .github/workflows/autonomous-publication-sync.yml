name: Autonomous Publication Sync

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deploy target after materialization
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production
      limit:
        description: Max pending artifacts to process
        required: true
        default: '3'
        type: string
  schedule:
    - cron: '17 * * * *'

permissions:
  contents: write

jobs:
  materialize-and-deploy:
    if: github.event_name == 'workflow_dispatch' || secrets.ENABLE_AUTONOMOUS_PUBLICATION_SYNC == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Materialize, verify, deploy, and audit
        env:
          CONTENT_API_URL: ${{ secrets.CONTENT_API_URL }}
          CONTENT_API_TOKEN: ${{ secrets.CONTENT_API_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PAGES_PROJECT_NAME: emdash-astro-sidecar
        run: >
          pnpm materialize:publications -- --apply --verify --audit
          --limit ${{ github.event.inputs.limit || '3' }}
          --deploy=${{ github.event.inputs.environment || 'preview' }}

      - name: Commit materialized content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/blog/src/content/blog .autonomous/publication-manifest.json
          if ! git diff --cached --quiet; then
            git commit -m "Materialize autonomous publications"
            git push
          fi
