name: Cloudflare Deployment

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.0.0"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-blog:
    name: Deploy Blog
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      preview-url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9.0.0"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        timeout-minutes: 10

      - name: Build
        run: pnpm verify
        timeout-minutes: 15

      - name: Deploy Preview
        id: deploy
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/staging')
        run: |
          OUTPUT=$(pnpm exec wrangler pages deploy apps/blog/dist/visibility-help/guide \
            --project-name=visibility-help \
            --branch=${{ github.head_ref || github.ref_name }} \
            --commit-message="Preview deployment" 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -o 'https://[^ ]*\.pages\.dev' | head -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        timeout-minutes: 5
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          pnpm exec wrangler pages deploy apps/blog/dist/visibility-help/guide \
            --project-name=visibility-help \
            --branch=main \
            --commit-message="Production deployment"
        timeout-minutes: 5
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-workers:
    name: Deploy Workers
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: deploy-blog
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9.0.0"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        timeout-minutes: 10

      - name: Sync guide SEO
        run: pnpm sync:guide-seo

      - name: Check environment contract
        run: pnpm autonomous:check-env
        timeout-minutes: 5
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CONTENT_API_TOKEN: ${{ secrets.CONTENT_API_TOKEN }}

      - name: Deploy route workers
        run: pnpm autonomous:deploy-workers -- --kind=route
        timeout-minutes: 5
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify root routing
        if: github.ref == 'refs/heads/main'
        run: pnpm qa:root-routing -- --live
        timeout-minutes: 5

      - name: Sync draft worker secrets
        shell: bash
        run: |
          if [ -n "${MINIMAX_API_KEY}" ]; then
            printf '%s' "${MINIMAX_API_KEY}" | pnpm exec wrangler secret put MINIMAX_API_KEY --config apps/cloudflare/workers/draft-worker/wrangler.toml
          fi
          if [ -n "${THECLAWBAY_API_KEY}" ]; then
            printf '%s' "${THECLAWBAY_API_KEY}" | pnpm exec wrangler secret put THECLAWBAY_API_KEY --config apps/cloudflare/workers/draft-worker/wrangler.toml
          fi
          if [ -n "${GEMINI_API_KEY}" ]; then
            printf '%s' "${GEMINI_API_KEY}" | pnpm exec wrangler secret put GEMINI_API_KEY --config apps/cloudflare/workers/draft-worker/wrangler.toml
          fi
        timeout-minutes: 10
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          THECLAWBAY_API_KEY: ${{ secrets.THECLAWBAY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Deploy control-plane workers
        run: pnpm autonomous:deploy-workers -- --kind=control-plane
        timeout-minutes: 10
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CONTENT_API_TOKEN: ${{ secrets.CONTENT_API_TOKEN }}

  deploy-emdash:
    name: Deploy EmDash Sidecar
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9.0.0"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        timeout-minutes: 10

      - name: Build EmDash Sidecar (emdash.no)
        run: EMDASH_SITE_KEY=emdash-no EMDASH_CONCEPT_KEY=sidecar pnpm --filter @emdash/blog build
        timeout-minutes: 10
        env:
          NODE_ENV: development

      - name: Deploy EmDash Sidecar to Cloudflare Pages
        run: |
          npx --yes wrangler@latest pages deploy apps/blog/dist/emdash-no/sidecar \
            --project-name=emdash-astro-sidecar \
            --branch=main \
            --commit-message="EmDash Sidecar landing page deploy"
        timeout-minutes: 5
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [deploy-blog, deploy-workers]
    if: failure()

    steps:
      - name: Report failure
        run: |
          echo "::error::Cloudflare deployment failed"
          echo "Trigger: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
