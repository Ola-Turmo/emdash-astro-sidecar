name = "emdash-draft-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[limits]
cpu_ms = 5000

[[d1_databases]]
binding = "AUTONOMOUS_DB"
database_name = "emdash-autonomous-control-plane"
database_id = "a1cd1a45-8a71-48e1-a067-df7f1e6924ea"

[vars]
JOB_LEASE_SECONDS = "120"
AUTONOMOUS_ALLOW_FALLBACK_DRAFTS = "false"
DRAFT_MAX_OUTPUT_TOKENS = "1600"
AUTONOMOUS_PROVIDER_ID = "minimax"
AUTONOMOUS_MODEL_ID = "MiniMax-M2.7"
AUTONOMOUS_FALLBACK_PROVIDER_ID = "theclawbay"
AUTONOMOUS_FALLBACK_MODEL_ID = "gpt-5.4"
THECLAWBAY_REASONING_EFFORT = "high"
