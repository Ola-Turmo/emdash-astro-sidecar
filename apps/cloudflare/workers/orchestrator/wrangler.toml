name = "emdash-autonomous-orchestrator"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[limits]
cpu_ms = 5000

[[d1_databases]]
binding = "AUTONOMOUS_DB"
database_name = "emdash-autonomous-control-plane"
database_id = "a1cd1a45-8a71-48e1-a067-df7f1e6924ea"

[[durable_objects.bindings]]
name = "HOST_CONTROL"
class_name = "HostControlDO"

[observability]
enabled = true

[placement]
mode = "smart"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["HostControlDO"]

[vars]
SYSTEM_NAME = "emdash-autonomous-control-plane"
CF_PLAN_TIER = "free"
CF_RESOURCE_GUARD_MODE = "conservative"
MAX_HOST_RUNS_PER_TICK = "1"
MAX_BROWSER_AUDIT_URLS_PER_RUN = "1"
HOST_LOCK_TTL_SECONDS = "300"
HOST_FAILURE_COOLDOWN_MINUTES = "10"
